name: Release

on:
  push:
    branches: [main]
    paths: ["VERSION"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read VERSION
        id: version
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: VERSIONはsemver形式（例: 1.2.0、vプレフィックスなし）で書いてください。実際の値: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=${VERSION%%.*}" >> "$GITHUB_OUTPUT"

      - name: Skip if this version is already released
        id: check
        run: |
          set -euo pipefail
          if git rev-parse "refs/tags/${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "同じバージョンのタグが既に存在するためリリースをスキップします: ${{ steps.version.outputs.version }}"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # 呼び出し元は @1 のようなメジャー浮動タグを参照する想定（docs/development.md 参照）。
      # ここでパッチタグ作成とメジャータグのforce-moveを1本化し、手動でのgit tag操作を不要にする。
      - name: Create version tag
        if: steps.check.outputs.skip == 'false'
        run: |
          set -euo pipefail
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Move major floating tag
        if: steps.check.outputs.skip == 'false'
        run: |
          set -euo pipefail
          git tag -f "${{ steps.version.outputs.major }}"
          git push origin "${{ steps.version.outputs.major }}" --force

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --generate-notes
