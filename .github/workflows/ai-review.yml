name: AI Review Bot (Reusable)

on:
  workflow_call:
    inputs:
      review_prompt:
        required: false
        type: string
        default: ""
      pr_number:
        required: false
        type: string
      config_path:
        description: "呼び出し元リポジトリ内の設定上書きファイルへの相対パス（例: .github/ai-review-config.yml）。未指定ならBot既定の設定を使用"
        required: false
        type: string
        default: ""
    secrets:
      LLM_API_KEY:
        required: false
      # 旧名（後方互換用）。LLM_API_KEY が未設定ならこちらを使用
      OPENAI_API_KEY:
        required: false
      # 任意。指定時のみ独自GitHub Appの名前でコメント投稿する。未指定なら標準の GITHUB_TOKEN（github-actions[bot]）で投稿
      GH_APP_ID:
        required: false
      GH_APP_PRIVATE_KEY:
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  ai_review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v7
        with:
          path: caller

      - name: Checkout ai-review-bot
        uses: actions/checkout@v7
        with:
          repository: enprocode/ai-review-bot
          path: ai-review-bot

      - name: Sync ai-review-bot to current PR commit
        if: ${{ github.repository == 'enprocode/ai-review-bot' && inputs.pr_number }}
        working-directory: ai-review-bot
        env:
          # run: スクリプトへの ${{ }} 直接埋め込みはスクリプトインジェクションの標的になり得るため env 経由にする
          PR_NUMBER_INPUT: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          git fetch origin "refs/pull/${PR_NUMBER_INPUT}/head" --depth=1
          git checkout --detach FETCH_HEAD

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          # 🟡 pipキャッシュを requirements に紐付け
          cache-dependency-path: ai-review-bot/requirements.txt

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install --upgrade -r ai-review-bot/requirements.txt

      - name: Generate GitHub App token
        id: app-token
        # GH_APP_ID/GH_APP_PRIVATE_KEY 未設定時はスキップし、標準の GITHUB_TOKEN を使う（導入時の必須設定を減らすため）
        if: ${{ secrets.GH_APP_ID != '' && secrets.GH_APP_PRIVATE_KEY != '' }}
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Run AI Review
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          REVIEW_PROMPT: ${{ inputs.review_prompt }}
          PR_NUMBER_INPUT: ${{ inputs.pr_number }}
          CONFIG_PATH_INPUT: ${{ inputs.config_path }}
        run: |
          set -euo pipefail
          PR_NUMBER="$PR_NUMBER_INPUT"
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER="$(jq -r '.pull_request.number // empty' "$GITHUB_EVENT_PATH")"
          fi
          if [ -z "$PR_NUMBER" ]; then
            echo "ERROR: PR number is not provided (neither inputs.pr_number nor pull_request event)."
            exit 1
          fi

          CONFIG_OVERRIDE=""
          if [ -n "$CONFIG_PATH_INPUT" ]; then
            CONFIG_OVERRIDE="caller/${CONFIG_PATH_INPUT}"
          fi

          python ai-review-bot/src/reviewer.py \
            --repo "$GITHUB_REPOSITORY" \
            --pr "$PR_NUMBER" \
            --prompt "$REVIEW_PROMPT" \
            --config-override "$CONFIG_OVERRIDE"
